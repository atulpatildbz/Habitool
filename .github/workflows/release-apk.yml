name: Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Re-setup Node (after Android SDK)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Node and npm
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "which node: $(which node)"
          echo "which npm: $(which npm)"

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run cap:android

      - name: Build debug APK
        run: |
          rm -f android/local.properties
          cd android
          ./gradlew --no-daemon assembleDebug

      - name: Prepare release asset
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "Habitool-${GITHUB_REF_NAME}-debug.apk"

      - name: Create release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: Habitool-${{ github.ref_name }}-debug.apk
